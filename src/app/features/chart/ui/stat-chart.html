@if (cardStat()) {
<section class="mt-6 md:mt-10">
    <div class="overflow-x-auto -mx-4 px-4 md:mx-0 md:px-0">
        <div class="min-w-[700px] md:min-w-[400px]">
            <canvas baseChart [data]="barChartData()" [options]="barChartOptions" [type]="barChartType"
                [plugins]="barChartPlugins">
            </canvas>
        </div>
    </div>
</section>

<section class="mt-8">
    <h3 class="mb-4 text-sm font-medium text-orange-400 uppercase tracking-wide text-center">Add boss to chart</h3>
    <div class="flex flex-col md:flex-row items-center justify-center md:w-full md:flex-wrap gap-2">
        @for (boss of bossListSelect; track boss.label; let i = $index) {

        <button type="button"
            class="boss-btn border-2 border-[#3f3f46] rounded-2xl flex items-center justify-center w-full md:w-96"
            (click)="pushOne(4 + i)">
            <img [src]="boss.img" [alt]="boss.label" class="h-10 w-10 rounded object-contain shrink-0" />
            <span class="text-sm font-medium text-zinc-200 text-left">{{ boss.label }}</span>
        </button>
        }
    </div>
</section>
}
